<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjana's Birthday Countdown</title>

    <link rel="icon" type="image/jpeg" href="favicn.png">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent-color: #ff79c6; --rose-red: #ff4d4d; --cherry: #ffb7c5; --sunflower: #ffd700; --lavender: #b19cd9; }
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* DECORATIONS: Floating Multi-Flowers & Icons */
        .decor { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .floating { position: absolute; font-size: 1.8rem; opacity: 0.3; animation: float 10s linear infinite; }
        @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        /* INTERACTIVE: Cursor Trail */
        .particle { position: fixed; width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; pointer-events: none; opacity: 0.8; transition: transform 0.1s linear; }

        .container { width: 90%; max-width: 800px; padding: 20px; z-index: 10; text-align: center; }
        h1 { font-size: clamp(1.5rem, 8vw, 3rem); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; color: var(--accent-color); }
        
        /* NEON & COLOR CHANGE */
        .neon-text { animation: neonTwinkle 3s infinite; }
        @keyframes neonTwinkle {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px var(--accent-color); color: #fff; }
            20%, 24%, 55% { text-shadow: none; color: rgba(255, 255, 255, 0.2); }
        }
        .color-shift { animation: colorCycle 4s linear infinite; font-weight: bold; }
        @keyframes colorCycle { 0% { color: #ff79c6; } 25% { color: #bd93f9; } 50% { color: #ff4d4d; } 75% { color: #8be9fd; } 100% { color: #ff79c6; } }

        #countdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; }
        .time-box { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(255, 121, 198, 0.15); }
        .number { display: block; font-size: 2.5rem; font-weight: 800; }
        .label { font-size: 0.7rem; color: var(--accent-color); }

        /* NEXT BUTTON */
        #next-btn {
            display: none; margin-top: 30px; padding: 15px 40px; font-size: 1rem; font-family: inherit;
            background: transparent; color: #fff; border: 2px solid var(--accent-color); border-radius: 50px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px var(--accent-color);
        }
        #next-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 25px var(--accent-color); }
    </style>
</head>
<body>

    <div class="decor">
        <span class="floating" style="left: 5%; animation-delay: 0s;">🌹</span>
        <span class="floating" style="left: 10%; animation-delay: 5s;">🌸</span>
        <span class="floating" style="left: 20%; animation-delay: 2s;">🌻</span>
        <span class="floating" style="left: 30%; animation-delay: 7s;">✨</span>
        <span class="floating" style="left: 40%; animation-delay: 4s;">🌸</span>
        <span class="floating" style="left: 50%; animation-delay: 1s;">🌹</span>
        <span class="floating" style="left: 60%; animation-delay: 6s;">🌻</span>
        <span class="floating" style="left: 70%; animation-delay: 3s;">✨</span>
        <span class="floating" style="left: 80%; animation-delay: 5s;">🌸</span>
        <span class="floating" style="left: 90%; animation-delay: 2s;">🌹</span>
    </div>

    <div class="container">
        <h1 id="title">Countdown to Sanjana's Birthday</h1>
        <div id="countdown">
            <div class="time-box"><span class="number" id="d">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="h">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="m">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="s">00</span><span class="label">Secs</span></div>
        </div>
        <p id="subtext" style="margin-top:40px; opacity:0.7;">Prepare for impact...</p>
        <button id="next-btn" onclick="alert('Next page coming soon!')">The Surprise Continues →</button>
    </div>

    <script>
        // TARGET DATE: April 21, 2026
        const targetDate = new Date("April 21, 2026 00:00:00").getTime();

        // INTERACTIVE: Mouse Trail
        document.addEventListener('mousemove', (e) => {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = e.pageX + 'px';
            p.style.top = e.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => { p.style.transform = 'scale(0)'; setTimeout(() => p.remove(), 200); }, 500);
        });

        function celebrate() {
            var end = Date.now() + (15 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff79c6', '#ff4d4d', '#ffb7c5', '#ffd700'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff79c6', '#ff4d4d', '#ffb7c5', '#ffd700'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff > 0) {
                document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            } else {
                clearInterval(timer);
                const title = document.getElementById("title");
                title.innerHTML = "Happy Birthday Sanjana🎊🎉✨";
                title.className = "neon-text";
                document.getElementById("countdown").style.display = "none";
                const sub = document.getElementById("subtext");
                sub.innerHTML = "Ready for the surprises this day holds for you M'lady😉";
                sub.className = "color-shift";
                document.getElementById("next-btn").style.display = "inline-block";
                celebrate();
            }
        }, 1000);
    </script>
</body>
</html>
